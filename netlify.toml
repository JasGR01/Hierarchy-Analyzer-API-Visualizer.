# netlify.toml
# Netlify build configuration for the React frontend.
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base    = "frontend"        # root directory Netlify builds from
  command = "npm run build"   # output goes to frontend/dist
  publish = "dist"

# SPA redirect: all routes → index.html (required for client-side routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security / caching headers for production assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
